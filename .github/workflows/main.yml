name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - name: Clean and Build
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release
        working-directory: MAPSRIDE-main/mapsride
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: MAPSRIDE-main/mapsride/build/app/outputs/flutter-apk/app-release.apk
