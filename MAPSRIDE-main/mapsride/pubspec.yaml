name: mapsride
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  geolocator: ^13.0.1
  # google_mobile_ads: ^5.1.0
  google_maps_flutter: ^2.10.0
  flutter_localizations:
    sdk: flutter
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  http: ^1.2.0
  geocoding: ^3.0.0
  sqflite: ^2.3.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/

flutter_native_splash:
  image: assets/images/maps_ride_splash.jpg
  color: "#ffffff"
  fullscreen: true
